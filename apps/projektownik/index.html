<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Projektownik | PM Command Center</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/packages/shared-ui/css/design-tokens.css">
    <link rel="stylesheet" href="/packages/shared-ui/css/toolbar.css">
    <link rel="stylesheet" href="/packages/shared-ui/css/image-resizer.css?v=2">
    <link rel="stylesheet" href="/packages/shared-ui/css/system-menu.css">
    <link rel="stylesheet" href="/projektownik/css/style.css">
</head>
<body>
    <div class="bg-layer"></div>

    <!-- Zastępujemy stary overlay ukrytym przyciskiem w top barze -->

    <!-- Główny widok (okno) -->
    <div id="viewport">
        <!-- Nieskończona tablica (Biurko) -->
        <div id="canvas">
            <!-- Puste płótno (Biurko) -->
        </div>
    </div>

    <!-- UI Overlay (Narzędzia - Flow Motion) -->
    <div id="ui-layer">
        
        <!-- TOP BAR -->
        <div class="top-bar">
            <div class="top-left-actions">
                <button class="icon-btn" id="undo-btn" title="Cofnij (Ctrl+Z)">
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7v6h6"></path><path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3l-3 2.7"></path></svg>
                </button>
                <button class="icon-btn" id="redo-btn" title="Ponów (Ctrl+Y)">
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M21 7v6h-6"></path><path d="M3 17a9 9 0 0 1 9-9 9 9 0 0 1 6 2.3l3 2.7"></path></svg>
                </button>
            </div>

            <div class="top-right-actions">
                <button class="icon-btn" id="refresh-btn" title="Odśwież (Przeładuj aplikację)">
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"></polyline><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path></svg>
                </button>
            </div>
        </div>
        
        <!-- BOTTOM PILL (Zunifikowany Flowbar Web Component) -->
        <shared-flowbar></shared-flowbar>
        
        <!-- Pływające Menu Techniczne -->
        <shared-system-menu></shared-system-menu>
    </div>

    <script type="module" src="/projektownik/js/app.js?v=4"></script>
</body>
</html>
