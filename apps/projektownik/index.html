<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Projektownik | PM Command Center</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/packages/shared-ui/css/design-tokens.css">
    <link rel="stylesheet" href="/projektownik/css/style.css">
</head>
<body>
    <div class="bg-layer"></div>

    <!-- Ekran logowania -->
    <div id="login-overlay">
        <div class="login-box">
            <h2>projektownik</h2>
            <p>Zaloguj się swoim kontem Google, aby wejść w projekt.</p>
            <button id="login-btn">Zaloguj przez Google</button>
        </div>
    </div>

    <!-- Główny widok (okno) -->
    <div id="viewport">
        <!-- Nieskończona tablica (Biurko) -->
        <div id="canvas">
            <!-- Puste płótno (Biurko) -->
        </div>
    </div>

    <!-- UI Overlay (Narzędzia - Flow Motion) -->
    <div id="ui-layer">
        
        <!-- TOP BAR -->
        <div class="top-bar">
            <button class="icon-btn" id="back-btn" title="Wróć do Portfolio" onclick="window.location.href='/'">
                <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
            </button>
            
            <div class="logo" style="pointer-events: auto; font-size: 0.8rem; font-weight: 800; letter-spacing: 0.2em; color: var(--teal); text-shadow: 0 0 10px rgba(0,201,200,0.5); text-transform: uppercase;">creative ai driven pm</div>

            <div class="top-right-actions">
                <button class="icon-btn" id="refresh-btn" title="Odśwież (Przeładuj aplikację)">
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"></polyline><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path></svg>
                </button>
                <button class="icon-btn" id="logout-btn" title="Wyloguj">
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                </button>
            </div>
        </div>
        
        <!-- BOTTOM PILL -->
        <div class="bottom-pill">
            <button class="pill-btn" id="anchor-btn" title="Rzuć / Wróć do Kotwicy">
                <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="5" r="3"></circle><line x1="12" y1="22" x2="12" y2="8"></line><path d="M5 12H2a10 10 0 0 0 20 0h-3"></path></svg>
            </button>
            
            <button class="pill-btn" id="add-note" title="Dodaj Tekst">
                <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="5" width="18" height="14" rx="2" ry="2" stroke-dasharray="4 2"></rect>
                    <polyline points="9 16 12 8 15 16"></polyline>
                    <line x1="10" y1="13" x2="14" y2="13"></line>
                </svg>
            </button>
            
            <button class="pill-btn" id="add-image-btn" title="Zdjęcie">
                <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
            </button>
            <input type="file" id="image-upload" accept="image/*" style="display: none;">
            
            <button class="pill-btn" id="add-frame" title="Ramka">
                <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect></svg>
            </button>
            
            <button class="pill-btn" id="add-kpi" title="Karta KPI">
                <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg>
            </button>
        </div>
    </div>

    <script type="module" src="/projektownik/js/app.js"></script>
</body>
</html>
