<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kreator | Creative AI PM</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/packages/shared-ui/css/nav.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Background Wallpaper from Portfolio -->
    <div class="bg-wallpaper"></div>

    <!-- Global Progress Bar -->
    <div id="progress-container">
        <div id="progress-bar"></div>
    </div>

    <!-- Header Navigation (Unified Monorepo Design) -->
    <nav>
        <div style="display: flex; align-items: center; gap: 15px;">
            <div class="nav-logo" onclick="window.location.href='../portfolio/index.html'">creative ai driven pm</div>
            <a href="/projektownik/index.html" class="chip" style="border-color: rgba(0, 201, 200, 0.4); color: var(--teal);">PROJEKTOWNIK ↗</a>
            <a href="/creator/index.html" class="chip" style="border-color: rgba(232, 25, 122, 0.4); color: var(--magenta);">KREATOR ↗</a>
        </div>
        <div class="header-controls">
            <span id="progress-text" class="progress-text">0% Gotowości</span>
            <button class="cyber-btn primary glow-btn" onclick="initProject()">[ INIT PROJECT ]</button>
        </div>
    </nav>

    <!-- Glass Transparency Slider (Right Side) -->
    <div class="glass-slider-container">
        <label for="glass-slider" class="glass-slider-label">Szkło</label>
        <input type="range" id="glass-slider" class="cyber-slider" min="0" max="100" value="70" orient="vertical">
    </div>

    <!-- Main Workspace (Single Canvas) -->
    <main class="creator-workspace">
        <!-- Notion-Style Container with Glassmorphism -->
        <div class="canvas-container" id="canvas-container">
            
            <!-- Mandatory Section -->
            <div class="mandatory-section">
                <input type="text" id="project-title" class="editor-title-input" placeholder="Wprowadź Nazwę Projektu..." autocomplete="off">
                <input type="text" id="project-version" class="editor-version-input" placeholder="v1.0" autocomplete="off">
            </div>

            <hr class="canvas-divider">

            <!-- Notion-Style Editor Body -->
            <div class="editor-body">
                <!-- Pływający przycisk [ + ] -->
                <div id="block-menu-trigger" class="block-menu-trigger hidden">+</div>
                
                <!-- Menu z blokami -->
                <div id="block-menu" class="block-menu hidden">
                    <div class="block-menu-header">Dodaj blok</div>
                    <button class="block-option" data-type="goal"><span style="color: var(--teal)">#</span> Cel (SMART)</button>
                    <button class="block-option" data-type="resources"><span style="color: var(--magenta)">#</span> Zasoby i Zespół</button>
                    <button class="block-option" data-type="dependencies"><span style="color: var(--magenta)">#</span> Zależności</button>
                    <button class="block-option" data-type="timeline"><span style="color: var(--teal)">#</span> Harmonogram</button>
                    <button class="block-option" data-type="risks"><span style="color: var(--magenta)">#</span> Ryzyka</button>
                </div>

                <!-- Główna ściana tekstu -->
                <div id="editor-content" class="editor-content" contenteditable="true" placeholder="Naciśnij Enter, aby zacząć pisać, lub kliknij [+] żeby dodać blok..."></div>
            </div>
            
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
