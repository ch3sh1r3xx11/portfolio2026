<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kreator | Creative AI PM</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/packages/shared-ui/css/design-tokens.css">
    <link rel="stylesheet" href="/packages/shared-ui/css/toolbar.css">
    <link rel="stylesheet" href="/packages/shared-ui/css/image-resizer.css?v=2">
    <link rel="stylesheet" href="/packages/shared-ui/css/nav.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Background Wallpaper from Portfolio -->
    <div class="bg-wallpaper"></div>

    <!-- Global Progress Bar -->
    <div id="progress-container">
        <div id="progress-bar"></div>
    </div>

    <!-- Header Navigation (Unified Monorepo Design) -->
    <nav>
        <div style="display: flex; align-items: center; gap: 15px;">
            <div class="nav-logo" onclick="window.location.href='/'">creative ai driven pm</div>
            <a href="/projektownik/index.html" class="chip" style="border-color: rgba(0, 201, 200, 0.4); color: var(--teal);">PROJEKTOWNIK ↗</a>
            <a href="/creator/index.html" class="chip" style="border-color: rgba(232, 25, 122, 0.4); color: var(--magenta);">KREATOR ↗</a>
        </div>
        <div class="header-controls">
            <span id="progress-text" class="progress-text">0% Gotowości</span>
            <button id="btn-export-md" class="cyber-btn primary">⬇ MD</button>
            <button id="btn-import-md" class="cyber-btn primary">⬆ MD</button>
            <input type="file" id="file-import-md" accept=".md" style="display: none;">
            <button id="btn-init-project" class="cyber-btn primary glow-btn">[ INIT PROJECT ]</button>
        </div>
    </nav>

    <!-- Glass Transparency Slider (Right Side) -->
    <div class="glass-slider-container">
        <label for="glass-slider" class="glass-slider-label">Szkło</label>
        <input type="range" id="glass-slider" class="cyber-slider" min="0" max="100" value="70" orient="vertical">
    </div>

    <!-- Main Workspace (Full Screen Wall of Text) -->
    <main id="viewport" class="creator-workspace">
        <div id="canvas" class="document-wrapper">
            <!-- Mandatory Section -->
            <div class="mandatory-section">
                <div class="meta-info">
                    <div class="meta-row">
                        <span class="meta-label">Nazwa:</span>
                        <input type="text" id="project-title" class="meta-input" placeholder="Wprowadź nazwę..." autocomplete="off">
                    </div>
                    <div class="meta-row">
                        <span class="meta-label">Wersja:</span>
                        <input type="text" id="project-version" class="meta-input" value="0.71" autocomplete="off">
                    </div>
                    <div class="meta-row">
                        <span class="meta-label">Data:</span>
                        <input type="text" id="project-date" class="meta-input" readonly>
                    </div>
                    <div class="meta-row">
                        <span class="meta-label">Activity:</span>
                        <input type="text" id="project-activity-dump" class="meta-input" readonly style="width: 480px;">
                    </div>
                </div>
                <!-- Heatmap Widget -->
                <div id="activity-heatmap" class="hm-container"></div>
            </div>

            <!-- Notion-Style Editor Body -->
            <div class="editor-body">
                <!-- Główna ściana tekstu -->
                <div id="editor-content" class="editor-content"></div>
            </div>
        </div>
    </main>

    <!-- Menu z blokami (moved outside canvas so position: fixed works properly) -->
    <div id="block-menu" class="block-menu hidden">
        <button class="block-option" data-type="vision"><span style="color: var(--teal)">#</span> Wizja</button>
        <button class="block-option" data-type="goal"><span style="color: var(--magenta)">#</span> Cel (SMART)</button>
        <button class="block-option" data-type="scope"><span style="color: var(--teal)">#</span> Zakres</button>
        <button class="block-option" data-type="plan"><span style="color: var(--magenta)">#</span> Plan</button>
        <button class="block-option" data-type="timeline"><span style="color: var(--teal)">#</span> Harmonogram</button>
        <button class="block-option" data-type="resources"><span style="color: var(--magenta)">#</span> Zasoby</button>
        <button class="block-option" data-type="risks"><span style="color: var(--teal)">#</span> Ryzyka</button>
        <button class="block-option" data-type="ifthen"><span style="color: var(--magenta)">#</span> If>Then</button>
        <button class="block-option" data-type="success"><span style="color: var(--teal)">#</span> Kryterium Sukcesu</button>
        <button class="block-option" data-type="empty"><span style="color: var(--magenta)">[ ... ]</span> Pusty Blok</button>
    </div>

    <!-- Floating Toolbar (Shared) -->
    <div class="bottom-pill-container">
        <div class="bottom-pill" id="bottom-tools">
            <button class="pill-btn" id="add-block-btn" title="Dodaj Blok (Cel, Zakres)">
                <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
            </button>
            <button class="pill-btn" id="add-note" title="Dodaj Notatkę">
                <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
            </button>
            <button class="pill-btn" id="add-text-btn" title="Dodaj Tekst">
                <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="5" width="18" height="14" rx="2" ry="2" stroke-dasharray="4 2"></rect>
                    <polyline points="9 16 12 8 15 16"></polyline>
                    <line x1="10" y1="13" x2="14" y2="13"></line>
                </svg>
            </button>
            <button class="pill-btn" id="add-image-btn" title="Zdjęcie">
                <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
            </button>
            <button class="pill-btn" id="add-frame" title="Ramka (Przegroda)">
                <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect></svg>
            </button>
            <button class="pill-btn" id="add-kpi" title="Checkbox / Zadanie">
                <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 11 12 14 22 4"></polyline><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path></svg>
            </button>
        </div>
    </div>

    <!-- Modal dla Importu MD -->
    <div id="import-md-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; z-index:200; background:rgba(0,0,0,0.8); backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px); align-items:center; justify-content:center;">
        <div style="background:rgba(20,25,30,0.9); border:1px solid rgba(255,255,255,0.1); border-radius:1rem; padding:2rem; width:90%; max-width:600px; display:flex; flex-direction:column; gap:1rem; color:var(--white); box-shadow: 0 20px 40px rgba(0,0,0,0.5);">
            <h3 style="font-family:var(--font-mono); color:var(--magenta); letter-spacing:0.1em; text-transform:uppercase;">IMPORT MARKDOWN</h3>
            <textarea id="import-md-textarea" placeholder="Wklej kod Markdown tutaj..." rows="12" style="padding:0.8rem; background:rgba(0,0,0,0.5); border:1px solid rgba(255,255,255,0.2); color:white; border-radius:4px; font-family:var(--font-mono); resize:vertical; font-size:0.9rem; outline:none;"></textarea>
            <div style="display:flex; justify-content:space-between; align-items:center; margin-top:0.5rem;">
                <button id="btn-import-md-file" style="padding:0.6rem 1.2rem; background:transparent; border:1px solid rgba(0,201,200,0.5); color:var(--teal); cursor:pointer; border-radius:4px; font-family:var(--font-mono); text-transform:uppercase;">Lub z pliku...</button>
                <div style="display:flex; gap:1rem;">
                    <button id="btn-close-import-modal" style="padding:0.6rem 1.2rem; background:transparent; border:1px solid var(--white-dim); color:var(--white-dim); cursor:pointer; border-radius:4px; font-family:var(--font-mono); text-transform:uppercase;">Anuluj</button>
                    <button id="btn-import-md-text" style="padding:0.6rem 1.2rem; background:var(--magenta); border:none; color:white; font-weight:bold; cursor:pointer; border-radius:4px; font-family:var(--font-mono); text-transform:uppercase;">Wklej Tekst</button>
                </div>
            </div>
        </div>
    </div>

    <script src="layout.js"></script>
    <script type="module" src="app.js"></script>
</body>
</html>
