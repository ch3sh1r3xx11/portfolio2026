<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Details | AI-Driven PM</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <style>
        /* Scrollbar (Cyberpunk Style) */
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: rgba(20, 32, 40, 0.5); border-left: 1px solid rgba(0, 201, 200, 0.2); }
        ::-webkit-scrollbar-thumb { background: var(--teal); border-radius: 0; }
        ::-webkit-scrollbar-thumb:hover { background: var(--magenta); }
        ::-webkit-scrollbar-corner { background: transparent; }
        :root {
            --black:     #1D2C37;
            --off-black: #142028;
            --white:     #f5f5f0;
            --white-dim: rgba(245,245,240, 0.7);
            --magenta:   #E8197A;
            --teal:      #00C9C8;
            --font-body: 'JetBrains Mono', ui-monospace, SFMono-Regular, Consolas, "Courier New", monospace;
            --font-mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, Consolas, "Courier New", monospace;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        html { background: var(--black); }
        body { width:100%; height:100vh; overflow:hidden; 
            font-family: var(--font-body); background: transparent;
            color: var(--white); -webkit-font-smoothing: antialiased; }
        
        body::before {
            content: ''; position: fixed; inset: -5%;
            background: url('bg.jpg') center/cover no-repeat; z-index: -2;
            filter: brightness(0.4) saturate(1.3); pointer-events: none;
        }
        body::after {
            content: ''; position: fixed; inset: 0;
            background-image: radial-gradient(circle at 15% 50%, rgba(169, 99, 139, 0.15) 0%, transparent 60%), radial-gradient(circle at 85% 30%, rgba(33, 136, 157, 0.15) 0%, transparent 50%);
            z-index: -1; pointer-events: none;
        }

        nav { position:fixed; top:0; left:0; right:0; z-index:100;
            display:flex; justify-content:space-between; align-items:center;
            padding:0.85rem 2.5rem; background: rgba(7,7,7,0.6);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.04); }
        .nav-logo { font-family: var(--font-mono); font-size:0.75rem; font-weight:700;
            letter-spacing:0.12em; text-transform:uppercase; cursor:pointer; color: var(--magenta); text-decoration:none; transition: color 0.2s; }
        .nav-logo:hover { color: var(--magenta); }
        .nav-counter { font-family: var(--font-mono); font-size:0.75rem; font-weight:700;
            color: var(--magenta); letter-spacing:0.1em; }

        /* ── 3D SCENE ── */
        .scene {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            perspective: 1500px;
        }

        /* Cylinder sized identically to portfolio.html */
        .cylinder {
            width: 85vw;
            height: 80vh;
            position: relative;
            transform-style: preserve-3d;
        }
        @media (min-width: 768px) {
            .cylinder { width: 70vw; }
        }

        /* Panel fills cylinder — same as portfolio.html */
        .panel {
            position: absolute;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
        }

        .panel-bg, .panel-content, .panel-bg-deep {
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
        }

        /* DEEP BACK FRAME (3rd layer) — identical to portfolio */
        .panel-bg-deep {
            position: absolute;
            inset: clamp(24px, 5vw, 48px);
            border-radius: 1.5rem;
            transform: translateZ(-70px);
            border: 1px solid rgba(255,255,255,0.3);
            box-shadow: 0 0 60px rgba(0,0,0,0.5);
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            pointer-events: none;
        }

        /* BACK FRAME — identical to portfolio */
        .panel-bg {
            position: absolute;
            inset: clamp(12px, 3vw, 24px);
            border-radius: 1.5rem;
            transform: translateZ(-25px);
            border: 1px solid rgba(255,255,255,0.06);
            box-shadow: 0 0 100px rgba(0,0,0,0.8);
            overflow: hidden;
            background: rgba(15,20,25,0.8);
        }

        /* High-tech grid inside background — identical to portfolio */
        .panel-bg::after {
            content: '';
            position: absolute;
            inset: -20%;
            background-image: 
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            transform: rotateX(20deg) scale(1.2);
            pointer-events: none;
        }

        /* Panel background colors */
        .panel[data-index="0"] .panel-bg { background: radial-gradient(circle at 80% 20%, rgba(37,163,173,0.4), transparent 60%), radial-gradient(circle at 20% 80%, rgba(33,136,157,0.3), transparent 60%), rgba(15,20,25,0.6); }
        .panel[data-index="1"] .panel-bg { background: radial-gradient(circle at 50% 50%, rgba(169,99,139,0.4), transparent 70%), radial-gradient(circle at 10% 90%, rgba(33,136,157,0.3), transparent 60%), rgba(15,20,25,0.6); }
        .panel[data-index="2"] .panel-bg { background: radial-gradient(circle at 50% 50%, rgba(169,99,139,0.3), transparent 70%), radial-gradient(circle at 10% 10%, rgba(37,163,173,0.3), transparent 50%), rgba(15,20,25,0.6); }
        .panel[data-index="3"] .panel-bg { background: radial-gradient(circle at 80% 80%, rgba(33,136,157,0.4), transparent 60%), radial-gradient(circle at 20% 20%, rgba(169,99,139,0.3), transparent 60%), rgba(15,20,25,0.6); }
        .panel[data-index="4"] .panel-bg { background: radial-gradient(circle at 10% 80%, rgba(37,163,173,0.4), transparent 60%), radial-gradient(circle at 90% 20%, rgba(169,99,139,0.3), transparent 60%), rgba(15,20,25,0.6); }
        .panel[data-index="5"] .panel-bg { background: radial-gradient(circle at 50% 20%, rgba(33,136,157,0.4), transparent 70%), radial-gradient(circle at 50% 80%, rgba(37,163,173,0.3), transparent 50%), rgba(15,20,25,0.6); }
        .panel[data-index="6"] .panel-bg { background: radial-gradient(circle at 90% 90%, rgba(169,99,139,0.4), transparent 60%), radial-gradient(circle at 10% 10%, rgba(33,136,157,0.3), transparent 60%), rgba(15,20,25,0.6); }
        .panel[data-index="7"] .panel-bg { background: radial-gradient(circle at 80% 20%, rgba(37,163,173,0.4), transparent 60%), radial-gradient(circle at 20% 80%, rgba(33,136,157,0.3), transparent 60%), rgba(15,20,25,0.6); }

        /* ── FRONT FRAME (Content / Glassmorphism) — identical to portfolio ── */
        .panel-content {
            position: absolute;
            inset: 0;
            z-index: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 5rem clamp(2rem, 8vw, 8rem);
            
            transform: translateZ(20px);
            background: rgba(12, 12, 14, 0.45);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 2rem;
            box-shadow: inset 0 0 30px rgba(255,255,255,0.02), 0 40px 100px rgba(0,0,0,0.8);
        }

        .panel-num { font-family: var(--font-mono); font-size:0.6rem; letter-spacing:0.2em; text-transform:uppercase; margin-bottom:1.5rem; display:flex; align-items:center; gap:0.6rem; }
        .panel-num-line { width:20px; height:1px; display:block; }
        .panel-title { font-size: clamp(2rem, 4vw, 3.5rem); font-weight: 900; line-height: 1.1; letter-spacing: -0.03em; margin-bottom: 1.25rem; text-transform: lowercase; }
        
        .stack-wrap { display:flex; flex-wrap:wrap; gap:0.75rem; margin-top:2.5rem; }
        .chip { display:inline-flex; align-items:center; justify-content:center; padding:0.6rem 1.2rem; border:1px solid rgba(255,255,255,0.2); border-radius:4px; font-size:0.9rem; color:var(--white-dim); font-family: monospace; text-transform: uppercase; letter-spacing: 0.05em; }

        @media (max-width: 640px) {
            nav { padding:0.7rem 1.25rem; }
            .panel-content { padding: 3rem 1.5rem; }
        }

        /* Stylizacja dla markdowna wewnątrz panelu */
        .markdown-body h1, .markdown-body h2, .markdown-body h3 { margin-top: 1.5em; margin-bottom: 0.5em; color: var(--white); }
        .markdown-body p { margin-bottom: 1em; }
        .markdown-body ul, .markdown-body ol { margin-bottom: 1em; padding-left: 1.5em; }
        .markdown-body li { margin-bottom: 0.25em; }
        .markdown-body a { color: var(--magenta); text-decoration: none; }
        .markdown-body strong { color: var(--white); }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>

<nav>
    <a href="index.html" class="nav-logo">creative ai driven pm</a>
    <span class="nav-counter" id="counter">01 / 02</span>
</nav>

<div class="scene">
    <div class="cylinder" id="cylinder">
        <!-- Generated via JS -->
    </div>
</div>

<script type="module">
    import { db } from './js/firebase-config.js';
    import { collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    async function loadFirebaseData() {
        try {
            const q = query(collection(db, "projects"), where("isPublished", "==", true));
            const querySnapshot = await getDocs(q);
            
            let projects = [];
            querySnapshot.forEach((doc) => {
                const data = doc.data();
                projects.push({
                    id: doc.id,
                    title: data.title || 'Brak tytułu',
                    themeColor: data.themeColor ? `var(--${data.themeColor})` : 'var(--teal)',
                    charterMarkdown: data.charterMarkdown || '*Brak treści raportu.*',
                    tags: data.tags || []
                });
            });

            if(projects.length === 0) {
                document.getElementById('cylinder').innerHTML = '<h1 style="text-align:center">Brak projektów</h1>';
                return;
            }
            initApp(projects);
        } catch(e) {
            console.error("Błąd Firebase", e);
            document.getElementById('cylinder').innerHTML = '<h1 style="text-align:center">Błąd ładowania</h1>';
        }
    }

    function initApp(baseProjects) {
        const urlParams = new URLSearchParams(window.location.search);
        const startId = urlParams.get('id');

        // Duplikujemy ekrany naprzemiennie, żeby cylinder miał pełne 8 slotów
        const multiplier = Math.max(1, Math.ceil(8 / baseProjects.length));
        const projects = [];
        for (let i = 0; i < multiplier; i++) {
            projects.push(...baseProjects);
        }
        
        let startIndex = projects.findIndex(p => p.id === startId);
        if (startIndex === -1) startIndex = 0;

        const cylinder = document.getElementById('cylinder');
        
        let html = '';
        projects.forEach((project, i) => {
            const parsedContent = marked.parse(project.charterMarkdown);
            let chipsHtml = project.tags.map(t => `<span class="chip" style="border-color:${project.themeColor}">${t}</span>`).join('');
            
            html += `
            <div class="panel" data-index="${i}">
                <div class="panel-bg-deep"></div>
                <div class="panel-bg"></div>
                <div class="panel-content">
                    <div class="panel-num" style="color:${project.themeColor}"><span class="panel-num-line" style="background:${project.themeColor}"></span>PROJECT CHARTER</div>
                    <h2 class="panel-title" style="color:${project.themeColor}">${project.title}</h2>
                    <div class="markdown-body" style="overflow-y: auto; max-height: 45vh; padding-right: 1.5rem; font-size: 0.95rem; line-height: 1.7; color: var(--white-dim);">
                        ${parsedContent}
                    </div>
                    <div class="stack-wrap">
                        ${chipsHtml}
                    </div>
                </div>
            </div>`;
        });
        cylinder.innerHTML = html;

        setupAnimation(startIndex, baseProjects, projects);
    }

    function setupAnimation(startIndex, baseProjects, projects) {
        const cylinder = document.getElementById('cylinder');
        const panels = Array.from(document.querySelectorAll('.panel'));
        const counter = document.getElementById('counter');
        const N = panels.length;
        const theta = 360 / N; 

        let currentAngle = 0;
        let velocity = 0;
        let isDragging = false;
        let isAutoRotating = false;
        let autoRotateTarget = 0;
        let radius = 0;

        function initGeometry() {
            const w = cylinder.offsetWidth;
            const gap = window.innerWidth < 768 ? 60 : 150;
            radius = Math.round((w / 2) / Math.tan(Math.PI / N)) + gap;

            panels.forEach((panel, i) => {
                panel.style.transform = `rotateY(${i * theta}deg) translateZ(${radius}px)`;
            });

            currentAngle = -startIndex * theta;
            cylinder.style.transform = `translateZ(${-radius}px) rotateY(${currentAngle}deg)`;
        }

        function loop() {
            if (isAutoRotating) {
                const distance = currentAngle - autoRotateTarget;
                velocity -= distance * 0.1;
                velocity *= 0.75;
                if (Math.abs(distance) < 0.1 && Math.abs(velocity) < 0.1) {
                    currentAngle = autoRotateTarget;
                    isAutoRotating = false;
                    velocity = 0;
                }
            } else if (!isDragging) {
                velocity *= 0.95;
                if (Math.abs(velocity) < 2) {
                    const snapPoint = Math.round(currentAngle / theta) * theta;
                    const distance = currentAngle - snapPoint;
                    if (Math.abs(distance) < (theta * 0.25)) {
                        velocity -= distance * 0.15;
                        velocity *= 0.5;
                    }
                }
            }

            currentAngle += velocity;
            cylinder.style.transform = `translateZ(${-radius}px) rotateY(${currentAngle}deg)`;

            const nearestIndex = Math.round(-currentAngle / theta);
            const realIndex = ((nearestIndex % N) + N) % N;
            const actualProject = projects[realIndex];
            const displayIndex = baseProjects.findIndex(p => p.id === actualProject.id);
            
            counter.textContent = String(displayIndex + 1).padStart(2, '0') + ' / ' + String(baseProjects.length).padStart(2, '0');

            requestAnimationFrame(loop);
        }

        function rotateRelative(dir) {
            let currentIndex = Math.round(-currentAngle / theta);
            isAutoRotating = true;
            autoRotateTarget = -(currentIndex + dir) * theta;
        }

        function next() { rotateRelative(1); }
        function prev() { rotateRelative(-1); }

        document.addEventListener('keydown', e => {
            if      (e.key === 'ArrowRight' || e.key === 'ArrowDown') next();
            else if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   prev();
        });

        let wheelTimeout;
        document.addEventListener('wheel', e => {
            // Tylko jak faktycznie scrollujemy karuzele, a nie kontener z markdownem
            if (e.target.closest('.markdown-body')) {
                // Jesli najechalismy na .markdown-body, nie blokujmy jego scrolla
                // Ale zapobiegajmy obracaniu karuzeli w pionie
                // Tylko jak scrolluje w poziomie (deltaX), obracaj karuzelę
                if (Math.abs(e.deltaX) > Math.abs(e.deltaY)) {
                    e.preventDefault();
                    isAutoRotating = false;
                    isDragging = true;
                    
                    clearTimeout(wheelTimeout);
                    wheelTimeout = setTimeout(() => { isDragging = false; }, 60);

                    currentAngle -= e.deltaX * 0.3;
                    velocity = -e.deltaX * 0.2;
                }
            } else {
                // Poza markdownem (czyli na tle)
                e.preventDefault();
                isAutoRotating = false;
                isDragging = true;
                
                clearTimeout(wheelTimeout);
                wheelTimeout = setTimeout(() => { isDragging = false; }, 60);

                const delta = Math.abs(e.deltaX) > Math.abs(e.deltaY) ? e.deltaX : e.deltaY;
                currentAngle -= delta * 0.3;
                velocity = -delta * 0.2;
            }
        }, { passive: false });

        let tx = 0;
        function startDrag(x) {
            isDragging = true;
            isAutoRotating = false;
            tx = x;
            velocity = 0;
        }
        function moveDrag(x) {
            if (!isDragging) return;
            const dx = x - tx;
            tx = x;
            const deltaAngle = dx * 0.15;
            currentAngle += deltaAngle;
            velocity = deltaAngle;
        }
        function endDrag() { isDragging = false; }

        document.addEventListener('touchstart', e => {
            if (!e.target.closest('.markdown-body')) {
                startDrag(e.touches[0].clientX);
            }
        }, { passive: true });
        
        document.addEventListener('touchmove', e => {
            if (!e.target.closest('.markdown-body') || isDragging) {
                moveDrag(e.touches[0].clientX);
            }
        }, { passive: true });
        
        document.addEventListener('touchend', endDrag, { passive: true });

        document.addEventListener('mousedown', e => {
            if (e.button !== 0) return; 
            if (e.target.closest('a') || e.target.closest('.btn') || e.target.closest('.markdown-body')) return; 
            startDrag(e.clientX);
        });
        document.addEventListener('mousemove', e => moveDrag(e.clientX));
        document.addEventListener('mouseup', endDrag);

        let rt;
        window.addEventListener('resize', () => {
            clearTimeout(rt);
            rt = setTimeout(initGeometry, 100);
        });

        initGeometry();
        loop();
    }

    loadFirebaseData();
</script>
</body>
</html>
